services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    environment:
      APP_ENV: production
      LOG_LEVEL: INFO
      REDIS_URL: redis://redis:6379/0
      API_KEYS: dev-key
      RATE_LIMIT_PER_MINUTE: 10
      MAX_REQUEST_COST_USD: 0.02
      ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 3s
      retries: 15

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE: http://localhost:8000
      VITE_API_KEY: dev-key
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_healthy
